server:
  port: 8080

spring:
  profiles:
    include: chatbot, notification, file, security
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
  datasource:
    url: jdbc:postgresql://localhost:5440/stonemark
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
    locations: classpath:db/migration

vision:
  server:
    url: http://localhost:8000

logging:
  level:
    org.springframework: INFO
    pt.estga: DEBUG

application:
#  base-url: http://localhost:8080
  base-url: https://api.stonemark.pt
  frontend:
    base-url: http://localhost:4200
    auth-url: http://localhost:4201
#  frontend-url: https://stonemark.pt

user:
  delete-after-days: 30

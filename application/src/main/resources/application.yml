server:
  port: 8080
  tomcat:
    threads:
      max: 200

spring:
  profiles:
    include: chatbot, notification, file, security, processing, review
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
  datasource:
    url: jdbc:postgresql://localhost:5440/stonemark
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      connection-timeout: 10000
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
    locations: classpath:db/migration
  modulith:
    events:
      completion-mode: update
      jdbc-schema-initialization:
        enabled: false
  jackson:
    deserializer:
      read_enum_values_using_index: false
      accept-case-insensitive-enums: true
  config:
    import: optional:file:.env[.properties]

vision:
  server:
    url: http://localhost:8000

logging:
  level:
    org.springframework: INFO
    pt.estga: DEBUG

application:
  base-url: https://api.stonemark.pt
  frontend:
    base-url: https://stonemark.pt
    auth-url: https://auth.stonemark.pt

user:
  delete-after-days: 30

cache:
  user-permissions:
    ttl-minutes: 15
    max-size: 1000

rate-limit:
  enabled: true
  exclude-paths:
    - /actuator
    - /actuator/**
  default:
    capacity: 100
    refill-tokens: 100
    refill-period: 1
    refill-unit: MINUTES
  paths:
    /api/v1/account/verification/chatbot:
      capacity: 10
      refill-tokens: 10
      refill-period: 1
      refill-unit: MINUTES

management:
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: [health, info, metrics, prometheus, env]
  endpoint:
    health:
      show-details: always
      group:
        readiness:
          include: [readinessState, vision, telegram, whatsapp, db]
        liveness:
          include: [livenessState]
      validate-group-membership: false

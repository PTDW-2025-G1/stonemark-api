spring:
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope: profile, email
            redirect-uri: "{baseUrl}/login/oauth2/code/google"
        provider:
          google:
            authorization-uri: https://accounts.google.com/o/oauth2/auth
            token-uri: https://oauth2.googleapis.com/token
            user-info-uri: https://www.googleapis.com/oauth2/v3/userinfo
            user-name-attribute: sub
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8081/realms/stonemark}
          jwk-set-uri: ${KEYCLOAK_JWK_SET_URI:http://localhost:8081/realms/stonemark/protocol/openid-connect/certs}

application:
  security:
    keycloak:
      enabled: true  # Keycloak-only mode (legacy auth removed)
    # Legacy JWT settings removed - tokens managed by Keycloak
    # Social auth (Google/Telegram) still uses legacy JWT temporarily
    jwt:
      secret-key: ${JWT_SECRET_KEY}  # Still needed for social auth
      access-token:
        expiration: 90000000 # 15 minutes - for social auth only
      refresh-token:
        expiration: 2592000000 # 30 days - for social auth only
    action-code:
      email-verification:
        expiration: 86400000 # 24 hours
      password-reset:
        expiration: 3600000 # 1 hour
      two-factor:
        expiration: 3600000 # 1 hour
      telephone-verification:
        expiration: 900000 # 15 minutes
      device-verification:
        expiration: 2592000000 # 30 days
      chatbot-verification:
        expiration: 900000 # 15 minutes
